<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <!-- Bootstrap CSS -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous"> -->
    <!-- Css -->
    <!-- <link rel="stylesheet" href="../static/css/index.css"> -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Sales Entry</title>
  </head>
  <style>
    .form-group {
      margin-bottom: 1rem;
      margin-left: 5rem;
      margin-right: 5rem;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      color: rgb(107 114 128); /* text-gray-700 */
      margin-bottom: 0.5rem;
    }

    .form-group input {
      display: block;
      width: 100%;
      color: #000000; /* text-gray-700 */
      background-color: #ffffff; /* bg-gray-200 */
      border: 1px solid #d2d6dc; /* border-gray-300 */
      border-radius: 0.5rem; /* rounded-lg */
      padding: 0.5rem;
    }
    body,
    html {
      margin: 0;
      padding: 0;
    }
    /* Container for tables */
    .table-container {
      height: 73.4%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      flex-wrap: wrap;
    }
    /* Style for the table */
    .summary-table {
      width: 100%; /* Ensure table fills the container */
      background-color: #ffffff;
      border-collapse: collapse;
      border-left: 1px double rgb(146, 146, 146);
      border-bottom: 1px double rgb(146, 146, 146);
      border-top: 1px double rgb(146, 146, 146);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.8);
      overflow-y: auto; /* Enable scrolling if content exceeds height */
      max-height: 40vh; /* Set maximum height to 40 viewport height units */
      table-layout: fixed; /* Ensure fixed table layout */
      scrollbar-width: thin;
      scrollbar-color: #fcfffb #838282;
    }

    /* Style for table headers */
    .summary-table th {
      padding: 12px;
      text-align: left;
      background-color: #f0f0f0;
      border-bottom: 1px solid #dddddd;
    }

    /* Style for table cells */
    .summary-table td {
      padding: 12px;
      border-bottom: 1px solid #dddddd;
      white-space: nowrap; /* Prevent wrapping of text */
      overflow: hidden;
      text-overflow: ellipsis; /* Display ellipsis (...) for overflow text */
    }
  </style>

  <body>
    {% include 'header.html' %}

    <div class="mx-40 py-16">
      <div
        class="bg-gray-100 p-4 rounded-lg shadow-md border-2 border-gray-500 mb-5"
      >
        <div class="flex justify-center item-center mx-2 mt-2">
          <h1 class="text-gray-500 text-2xl">Entry Filter for Sales Entry</h1>
        </div>
        <form action="{% url 'sales_entry' %}" method="post">
          <div class="form-group">{% csrf_token %} {{ entry_finder }}</div>
          <div class="flex justify-center">
            <input
              class="block w-6/12 bg-white text-gray-500 py-2 px-10 rounded border-2 border-gray-500 shadow hover:bg-gray-500 hover:text-white"
              type="Submit"
              value="Submit"
            />
          </div>
        </form>
      </div>

      <div
        class="bg-gray-100 p-4 rounded-lg shadow-md border-2 border-gray-500"
      >
        <div class="flex justify-center item-center mx-2 mt-2">
          <h1 class="text-gray-500 text-2xl">Sales Information</h1>
        </div>
        <form action="{% url 'sales_entry' %}" method="post">
          <div class="form-group">{% csrf_token %} {{form}}</div>

          <div class="flex justify-center">
            <input
              class="block w-6/12 bg-white text-gray-500 py-2 px-10 rounded border-2 border-gray-500 shadow hover:bg-gray-500 hover:text-white"
              type="Submit"
              value="Submit"
            />
          </div>
        </form>
      </div>
      <div
        class="overflow-y-auto mt-4 border-2 border-gray-500 rounded-lg bg-gray-100 p-4"
      >
        <div class="flex justify-center item-center mx-2 mt-2">
          <h1 class="text-gray-500 text-2xl">Entries</h1>
        </div>
        {% if table %}
        <div class="summary-table">{{search|safe}}</div>

        {% else %}
        <p>No data available.</p>
        {% endif %}
      </div>
    </div>
    {% include 'footer.html' %}

    <div class="header">
      <p class="" style="font-size: 0.5cm; font-weight: 500; color: #fff">
        <b
          class="p-2 shadow"
          style="border-radius: 5px; background-color: #55608f"
          >Entries</b
        >
      </p>
    </div>
    <div class="container1" id="rowsContainer">{{search|safe}}</div> -->

    <!-- <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
    crossorigin="anonymous"></script> -->
    <script>
      $(document).ready(function () {
        // Add click event listener to each table row
        $("table tbody tr").click(function () {
          // Remove any previously highlighted rows
          console.log("clicked");
          $("table tbody tr").removeClass("highlight");

          // Add highlight class to the clicked row
          $(this).addClass("highlight");
        });
      });
    </script>
  </body>
</html>
